<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Power Master</title>
  <link rel="icon" type="image/svg+xml" href="./icons/power-master.svg">
  <meta name="theme-color" content="#1a237e">
  <link rel="stylesheet" href="./styles.css">
  <link rel="stylesheet" href="./tool-shell.css">
  <link rel="stylesheet" href="./power-master.css">
</head>
<body class="tool-page power-master-page">
  <div class="app">
    <header class="app-header">
      <h1 class="app-title"><span class="tool-mark tool-mark--power" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="m13 2-8 12h6l-1 8 9-13h-6V2Z"/></svg></span><span>Power Master</span></h1>
      <p>Build a duration-aware pacing profile and printable stem dashboard.</p>
    </header>

    <div class="section-label">Parameters</div>
    <p id="status" class="status floating-status" role="status" aria-live="polite"></p>
    <nav id="parameter-actions" class="parameter-actions" aria-label="Parameters">
      <div class="parameter-file-slot">
        <button id="load-button" class="parameter-load parameter-icon-button" type="button" title="Load Parameters" aria-label="Load Parameters"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 7h7l2 2h9v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7Zm9 10V11m0 6 3-3m-3 3-3-3"/></svg></button>
        <div id="loaded-plan-control" class="loaded-file-control" hidden>
          <input id="loaded-plan-name" type="text" readonly aria-label="Loaded parameter file" title="Click to replace the loaded parameter file">
          <button id="remove-loaded-plan" class="icon-button danger" type="button" title="Remove loaded parameter file" aria-label="Remove loaded parameter file"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7h16M9 7V4h6v3m3 0-1 13H7L6 7m4 4v5m4-5v5"/></svg></button>
        </div>
        <input class="file-input" id="load-plan" type="file" accept="application/json,.json">
      </div>
    <button id="save-button" class="parameter-save parameter-icon-button" type="button" title="Save Parameters" aria-label="Save Parameters"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 3h12l2 2v16H5V3Zm3 0v6h8V3M8 21v-7h8v7"/></svg></button>
    <button id="reset-button" class="danger parameter-icon-button" type="button" title="Reset Parameters" aria-label="Reset Parameters"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7h16M9 7V4h6v3m3 0-1 13H7L6 7m4 4v5m4-5v5"/></svg></button>
    <button class="parameter-pin icon-button section-sticky-toggle" type="button" data-sticky-target="parameter-actions" data-sticky-default="true" data-sticky-persist="false" title="Pin while scrolling" aria-label="Pin while scrolling" aria-pressed="true"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 3h6l-1 6 3 3v2H7v-2l3-3-1-6Z"/><path d="M12 14v7"/></svg></button>
    </nav>

    <div id="planning-fields" class="planning-stack"></div>

    <div class="workspace">
      <main class="editor-stack">
      <details id="section-power-targets" class="card collapsible-section" open>
        <summary class="section-title"><div class="section-heading"><span>5</span><h2>Pacing Targets</h2></div><div class="section-actions">
          <a class="icon-button section-link" href="#section-power-targets" data-section-link="section-power-targets" title="Copy link to Pacing Targets" aria-label="Copy link to Pacing Targets"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M10 13a5 5 0 0 0 7.5.5l2-2a5 5 0 0 0-7-7l-1.2 1.2"/><path d="M14 11a5 5 0 0 0-7.5-.5l-2 2a5 5 0 0 0 7 7l1.2-1.2"/></svg></a>
          <label class="summary-units targets-units">Units <select id="targets-units"><option value="imperial">Imperial</option><option value="metric">Metric</option></select></label>
          <button id="toggle-targets" class="icon-button" type="button" title="Collapse All Pacing Targets" aria-label="Collapse All Pacing Targets"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="m7 9 5-5 5 5M7 15l5 5 5-5"/></svg></button>
          <button id="add-target" class="icon-button" type="button" title="Add Pacing Target" aria-label="Add Pacing Target"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg></button>
          <button id="targets-undo" class="icon-button" type="button" title="Undo" aria-label="Undo"><svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" stroke="none" d="M7.5 7H16a5 5 0 0 1 0 10h-4v-2h4a3 3 0 0 0 0-6H7.5l3 3L9 13.5 3.5 8 9 2.5 10.5 4l-3 3Z"/></svg></button>
          <button id="targets-redo" class="icon-button" type="button" title="Redo" aria-label="Redo"><svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" stroke="none" d="M16.5 7H8a5 5 0 0 0 0 10h4v-2H8a3 3 0 0 1 0-6h8.5l-3 3 1.5 1.5L20.5 8 15 2.5 13.5 4l3 3Z"/></svg></button>
          <button id="targets-clear" class="icon-button danger" type="button" title="Reset Pacing Targets" aria-label="Reset Pacing Targets"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7h16M9 7V4h6v3m3 0-1 13H7L6 7m4 4v5m4-5v5"/></svg></button>
          <button class="icon-button section-sticky-toggle" type="button" data-sticky-target="section-power-targets" title="Pin while scrolling" aria-label="Pin while scrolling" aria-pressed="false"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 3h6l-1 6 3 3v2H7v-2l3-3-1-6Z"/><path d="M12 14v7"/></svg></button>
        </div></summary>
        <div class="profile-targets">
          <label class="field"><span>Profile Targets</span><select id="profile-template">
            <option value="sprinter">Sprinter (5–15 seconds)</option><option value="puncheur">Puncheur (4 minutes)</option>
            <option value="breakaway">Breakaway Specialist (5 minutes)</option><option value="rouleur" selected>Rouleur (6 minutes)</option>
            <option value="gc">GC Specialist (8 minutes)</option><option value="climber">Climber (20–40 minutes)</option>
            <option value="time-trialist">Time Trialist (40–60+ minutes)</option>
          </select></label>
          <label class="field"><span>Total Duration</span><div class="profile-duration-control"><input id="profile-duration" type="number" min="0" max="1440" step="1" value="180" data-slider-max="1440"><select id="profile-duration-unit"><option value="minutes">min</option><option value="hours">hr</option></select></div></label>
          <div class="profile-action-buttons">
            <button id="add-profile-targets" type="button" data-profile-mode="add">Add</button>
            <button id="replace-profile-targets" type="button" data-profile-mode="replace">Replace</button>
          </div>
        </div>
        <div id="target-list" class="target-list"></div>
      </details>
      <section id="section-plan-summary" class="card summary-card">
        <header class="section-title"><div class="section-heading"><h2>Plan Summary</h2></div><div class="section-actions"><a class="icon-button section-link" href="#section-plan-summary" data-section-link="section-plan-summary" title="Copy link to Plan Summary" aria-label="Copy link to Plan Summary"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M10 13a5 5 0 0 0 7.5.5l2-2a5 5 0 0 0-7-7l-1.2 1.2"/><path d="M14 11a5 5 0 0 0-7.5-.5l-2 2a5 5 0 0 0 7 7l1.2-1.2"/></svg></a><label class="summary-units">Units <select id="summary-units"><option value="imperial">Imperial</option><option value="metric">Metric</option></select></label><button class="icon-button section-sticky-toggle" type="button" data-sticky-target="section-plan-summary" title="Pin while scrolling" aria-label="Pin while scrolling" aria-pressed="false"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 3h6l-1 6 3 3v2H7v-2l3-3-1-6Z"/><path d="M12 14v7"/></svg></button></div></header>
        <div id="plan-summary" class="summary-grid"></div>
      </section>
      </main>

      <aside id="stem-dashboard-panel" class="preview-wrap">
        <details id="section-stem-dashboard" class="card appearance-card collapsible-section" open>
          <summary class="section-title"><div class="section-heading"><span>Stem Dashboard</span></div><div class="section-actions">
            <a class="icon-button section-link" href="#section-stem-dashboard" data-section-link="section-stem-dashboard" title="Copy link to Stem Dashboard" aria-label="Copy link to Stem Dashboard"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M10 13a5 5 0 0 0 7.5.5l2-2a5 5 0 0 0-7-7l-1.2 1.2"/><path d="M14 11a5 5 0 0 0-7.5-.5l-2 2a5 5 0 0 0 7 7l1.2-1.2"/></svg></a>
            <button id="tape-undo" class="icon-button" type="button" title="Undo Stem Dashboard" aria-label="Undo Stem Dashboard"><svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" stroke="none" d="M7.5 7H16a5 5 0 0 1 0 10h-4v-2h4a3 3 0 0 0 0-6H7.5l3 3L9 13.5 3.5 8 9 2.5 10.5 4l-3 3Z"/></svg></button>
            <button id="tape-redo" class="icon-button" type="button" title="Redo Stem Dashboard" aria-label="Redo Stem Dashboard"><svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" stroke="none" d="M16.5 7H8a5 5 0 0 0 0 10h4v-2H8a3 3 0 0 1 0-6h8.5l-3 3 1.5 1.5L20.5 8 15 2.5 13.5 4l3 3Z"/></svg></button>
            <button id="tape-reset" class="icon-button danger" type="button" title="Reset Stem Dashboard" aria-label="Reset Stem Dashboard"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7h16M9 7V4h6v3m3 0-1 13H7L6 7m4 4v5m4-5v5"/></svg></button>
            <label class="summary-units dashboard-units">Units <select id="tape-units"><option value="imperial">Imperial</option><option value="metric">Metric</option></select></label>
            <button class="icon-button section-sticky-toggle" type="button" data-sticky-target="stem-dashboard-panel" title="Pin while scrolling" aria-label="Pin while scrolling" aria-pressed="false"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 3h6l-1 6 3 3v2H7v-2l3-3-1-6Z"/><path d="M12 14v7"/></svg></button>
          </div></summary>
          <div class="appearance-grid">
            <label class="field"><span id="stem-width-label">Stem Width (in)</span><div class="slider-row"><input id="stem-width" type="range"><input id="stem-width-value" class="slider-value" type="number" aria-label="Stem width value"></div></label>
            <label class="field"><span id="tape-length-label">Max Dashboard Length (in)</span><div class="slider-row"><input id="tape-length" type="range"><input id="tape-length-value" class="slider-value" type="number" min="0" placeholder="Auto" aria-label="Maximum dashboard length value"></div></label>
            <label class="field"><span>Base Font Size (pt)</span><div class="slider-row"><input id="base-font-size" type="range" min="3.5" max="9" step="0.25"><input id="base-font-size-value" class="slider-value" type="number" min="3.5" max="9" step="0.25" aria-label="Base font size value"></div></label>
          </div>
        </details>
        <div id="preview-panel" class="preview-panel">
          <div class="preview-title">Preview</div>
          <div class="preview-controls"><input id="preview-zoom" type="range" min="100" max="250" step="10"><output id="preview-zoom-value">140%</output></div>
          <div id="preview-viewport" class="preview-viewport"><button id="expand-preview" class="icon-button preview-expand" type="button" title="Expand Preview" aria-label="Expand Preview"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 3H3v5M16 3h5v5M21 16v5h-5M3 16v5h5"/></svg></button><div id="tape" class="tape"></div></div>
          <button id="save-tape" class="secondary preview-save" type="button">Save Dashboard</button>
        </div>
      </aside>
    </div>
    <footer class="site-footer">&copy; 2026 psychobolt &middot; Licensed under the <a href="./LICENSE">MIT License</a>.</footer>
  </div>

  <!-- Pinned for stable desktop drag-and-drop. Native dragging remains as an offline fallback. -->
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js" crossorigin="anonymous"></script>
  <script src="./scripts/utils/functions.js"></script>
  <script src="./scripts/utils/math.js"></script>
  <script src="./scripts/utils/model-config.js"></script>
  <script src="./scripts/planning-model.js"></script>
  <script src="./scripts/app.js"></script>
  <script src="./scripts/activity-parser.js"></script>
  <script src="./scripts/planning-ui.js"></script>
  <script src="./scripts/power-master.js"></script>
</body>
</html>
